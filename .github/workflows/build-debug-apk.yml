name: Build Debug APK (Manual)

on:
  workflow_dispatch: # 仅允许手动触发，不占用推送资源

jobs:
  build-android:
    runs-on: ubuntu-latest # Debug 不需要 macos，ubuntu 更快更省额度
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Get Flutter packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build Debug APK
        run: |
          cd simple_live_app
          flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
